<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Seguimiento de pedidos</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#f8fafc;color:#0f172a;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.wrap{max-width:768px;margin:0 auto;padding:0 16px}
.main{padding:20px 16px}
.banner{background:#fffbeb;border-bottom:1px solid #fde68a;color:#92400e;font-size:12px;text-align:center;padding:8px 16px}
.header{background:linear-gradient(135deg,#1e3a8a 0%,#4338ca 55%,#4f46e5 100%);border-bottom:none}
.header-bp{background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:22px 22px}
.head-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 16px}
.brand{display:flex;align-items:center;gap:12px}
.wmark{width:40px;height:40px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex:none}
.wmark svg{width:24px;height:24px}
.app-title{font-size:18px;font-weight:700;letter-spacing:-.01em;color:#fff}
.app-sub{font-size:12px;color:#c7d2fe}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-size:14px;font-weight:600;padding:9px 14px;cursor:pointer;font-family:inherit}
.btn .ic{width:16px;height:16px}
.btn-primary{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#1d4ed8,#4338ca)}
.btn-head{background:#fff;color:#3730a3}
.btn-head:hover{background:#eef2ff}
.btn-main{background:var(--main);color:#fff;width:100%;padding:11px 16px;margin-top:4px}
.btn-sec{background:#fff;color:#334155;border:1px solid #cbd5e1}
.btn-sec:hover{background:#f8fafc}
.btn-danger{background:#e11d48;color:#fff}
.btn-danger:hover{background:#be123c}
.grow{flex:1}
.hide-sm{display:inline}.only-sm{display:none}
@media(max-width:520px){.hide-sm{display:none}.only-sm{display:inline}}
.searchbox{position:relative;margin-bottom:16px}
.search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#94a3b8;pointer-events:none}
.search-inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:10px 12px 10px 36px;font-size:14px;font-family:inherit;background:#fff;color:#0f172a}
.search-inp:focus{outline:none;border-color:#0f172a;box-shadow:0 0 0 1px #0f172a}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:6px;flex:none;border:1px solid #e2e8f0;background:#fff;color:#475569;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.chip .ic{width:14px;height:14px}
.chip:hover{border-color:#cbd5e1}
.chip.active{background:var(--soft);color:var(--softtext);border-color:var(--brd)}
.chip-n{margin-left:2px;background:#f1f5f9;border-radius:999px;padding:1px 7px;font-size:11px;font-weight:700;color:#334155}
.chip.active .chip-n{background:#fff}
.meta{display:flex;align-items:center;justify-content:space-between;margin:14px 0}
.linkbtn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#475569;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.linkbtn .ic{width:14px;height:14px}
.linkbtn:hover{color:#0f172a}
.muted-xs{font-size:12px;color:#94a3b8}
.muted-sm{font-size:12px;color:#64748b}
.bold-xs{font-size:12px;font-weight:700;color:#334155}
.done-sm{font-size:12px;font-weight:600;color:#059669}
.cards{display:flex;flex-direction:column;gap:12px}
.oc{display:block;width:100%;text-align:left;background:var(--soft);border:1px solid var(--brd);border-left:4px solid var(--edge);border-radius:12px;padding:16px;cursor:pointer;font-family:inherit;transition:box-shadow .15s ease,transform .15s ease}
.oc:hover{box-shadow:0 6px 16px rgba(15,23,42,.12);transform:translateY(-1px)}
.oc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.oc-name{font-weight:600;color:#0f172a;word-break:break-word}
.oc-name-wrap{min-width:0}
.oc-name-wrap .mono{margin-top:2px}
.oc-bot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:6px;flex:none;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;background:var(--soft);color:var(--softtext);white-space:nowrap}
.badge .ic{width:14px;height:14px}
.badge-done{background:#ecfdf5;color:#047857}
.progress{display:flex;gap:4px;margin-top:12px}
.seg{height:6px;flex:1;border-radius:999px;background:#e2e8f0}
.seg.fill{background:var(--main)}
.empty{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:56px 24px;margin-top:8px}
.empty-title{font-size:16px;font-weight:600}
.empty-sub{font-size:14px;color:#64748b;margin-top:4px;max-width:360px}
.nores{background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:32px;text-align:center;font-size:14px;color:#64748b}
.footnote{margin-top:24px;text-align:center;font-size:12px;color:#94a3b8;font-family:ui-monospace,monospace}
.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e2e8f0}
.accentbar{height:4px;background:var(--main)}
.top-inner{max-width:768px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:12px 16px}
.top-titles{min-width:0;flex:1}
.top-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:none;border-radius:8px;color:#475569;cursor:pointer;flex:none}
.icon-btn .ic{width:20px;height:20px}
.icon-btn:hover{background:#f1f5f9}
.icon-btn.danger{color:#94a3b8}
.icon-btn.danger:hover{background:#fff1f2;color:#e11d48}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px}
.pad{padding:16px}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.row-gap{display:flex;gap:12px;margin-top:16px}
.stepper{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.field{display:block;margin-bottom:12px}
.flabel{display:block;margin-bottom:4px;font-family:ui-monospace,monospace;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#64748b}
.req{color:#f43f5e}
.inp{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;background:#fff;color:#0f172a}
.inp:focus{outline:none;border-color:#0f172a;box-shadow:0 0 0 1px #0f172a}
.ta{resize:vertical;min-height:76px}
.panel{border-radius:12px;background:#fff;overflow:hidden}
.panel.locked{display:flex;align-items:center;gap:12px;border:1px solid #e2e8f0;background:#f8fafc;padding:16px}
.panel.active{border:2px solid var(--brd)}
.panel.done{border:1px solid var(--brd)}
.pcircle{width:32px;height:32px;border-radius:999px;background:var(--main);color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.pcircle .ic{width:16px;height:16px}
.pcircle-gray{width:32px;height:32px;border-radius:999px;background:#e2e8f0;color:#94a3b8;display:flex;align-items:center;justify-content:center;flex:none}
.pcircle-gray .ic{width:16px;height:16px}
.phead{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--brd);background:var(--soft)}
.phead-btn{display:flex;width:100%;align-items:center;gap:12px;padding:16px;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit}
.pgrow{min-width:0;flex:1}
.p-title{font-size:14px;font-weight:600;color:#0f172a}
.p-title-muted{font-size:14px;font-weight:500;color:#64748b}
.ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbody{padding:16px}
.pbody.bordered{border-top:1px solid #f1f5f9;padding-top:12px}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px}
.thumb{position:relative;width:96px;height:96px;flex:none}
.thumb img{width:96px;height:96px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;display:block}
.thumb-x{position:absolute;top:4px;right:4px;background:#0f172a;color:#fff;border:none;border-radius:999px;padding:3px;cursor:pointer;display:flex}
.thumb-x .ic{width:12px;height:12px}
.thumb-dl{position:absolute;bottom:4px;right:4px;background:#0f172a;color:#fff;border:none;border-radius:999px;padding:3px;cursor:pointer;display:flex}
.thumb-dl .ic{width:12px;height:12px}
.thumb-dl:hover{background:#334155}
.photo-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:96px;height:96px;flex:none;border:2px dashed #cbd5e1;border-radius:8px;background:none;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;padding:4px}
.photo-add .ic{width:18px;height:18px}
.photo-add:hover{border-color:#94a3b8;color:#475569}
.pdf-list,.pdf-grid{display:flex;flex-direction:column;gap:8px}
.pdf-item{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;background:#fff}
.pdf-link{display:flex;align-items:center;gap:8px;color:#0f172a;font-size:13px;font-weight:600;text-decoration:none}
.pdf-link .ic{width:16px;height:16px}
.pdf-x{background:#0f172a;color:#fff;border:none;border-radius:999px;padding:4px;cursor:pointer;display:flex;flex:none}
.pdf-x .ic{width:12px;height:12px}
.pdf-add{display:flex;align-items:center;justify-content:center;gap:6px;border:2px dashed #cbd5e1;border-radius:8px;background:none;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px}
.pdf-add .ic{width:16px;height:16px}
.pdf-add:hover{border-color:#94a3b8;color:#475569}
.final{display:flex;align-items:center;gap:12px;border:1px solid #a7f3d0;background:#ecfdf5;border-radius:12px;padding:16px;margin-top:12px}
.final-circle{width:36px;height:36px;border-radius:999px;background:#059669;color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.final-circle .ic{width:20px;height:20px}
.final-title{font-size:14px;font-weight:600;color:#065f46}
.final-sub{font-size:12px;color:#047857}
.modal-bg{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(15,23,42,.5)}
.modal{background:#fff;border-radius:12px;padding:20px;max-width:360px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal h3{margin:0;font-size:16px;font-weight:600}
.modal p{margin:6px 0 0;font-size:14px;color:#475569}
.modal-row{display:flex;gap:12px;margin-top:16px}
.modal-row .btn{flex:1}
.btn-report{width:100%;margin-top:12px}
.report-actions{position:sticky;top:0;z-index:10;display:flex;gap:12px;justify-content:space-between;background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px}
.report{max-width:768px;margin:0 auto;padding:24px 16px 48px}
.rtop{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:2px solid #0f172a;margin-bottom:16px}
.rtitle{font-size:20px;font-weight:700;flex:1}
.rcode{font-size:13px;color:#64748b}
.rsummary{display:flex;flex-wrap:wrap;gap:14px 32px;margin-bottom:16px}
.rsummary>div{display:flex;flex-direction:column;gap:3px}
.rbig{font-size:18px;font-weight:600}
.rprogress{margin-bottom:24px}
.rsection{border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:14px;break-inside:avoid;page-break-inside:avoid}
.rsection-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rnum{width:26px;height:26px;border-radius:999px;background:var(--main);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.rsflex{flex:1;min-width:0}
.rsname{font-size:15px;font-weight:600}
.rsrole{font-size:12px;color:#64748b}
.rstatus{margin-left:auto;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;flex:none}
.rstatus.done{background:#ecfdf5;color:#047857}
.rstatus.pending{background:#f1f5f9;color:#64748b}
.rfields{display:flex;flex-direction:column;gap:8px}
.rfield{display:flex;justify-content:space-between;gap:16px;font-size:14px;border-bottom:1px solid #f1f5f9;padding-bottom:8px}
.rfield:last-child{border-bottom:none;padding-bottom:0}
.rlabel{color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.03em;font-family:ui-monospace,monospace}
.rvalue{color:#0f172a;text-align:right;font-weight:500;word-break:break-word}
.rsummary .rvalue{text-align:left}
.rphotos{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.rphoto{margin:0}
.rphoto img{width:220px;max-width:100%;height:auto;border-radius:8px;border:1px solid #e2e8f0;display:block}
.rphoto figcaption{font-size:12px;color:#64748b;margin-top:4px;font-family:ui-monospace,monospace}
.rfoot{margin-top:24px;font-size:12px;color:#94a3b8;text-align:center;font-family:ui-monospace,monospace}
.inp:disabled{background:#f8fafc;color:#334155;opacity:1;cursor:default}
.ro-note{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;font-family:ui-monospace,monospace;margin-top:2px}
.ro-note .ic{width:14px;height:14px}
.ro-empty{font-size:13px;color:#94a3b8}
.field-link{display:inline-block;color:#2563eb;font-size:14px;font-weight:600;text-decoration:underline;word-break:break-all;padding:2px 0}
.field-openlink{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:none;border:none;color:#2563eb;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}
.field-openlink .ic{width:14px;height:14px}
.field-openlink:hover{text-decoration:underline}
.rvalue a{color:#2563eb;word-break:break-all}
.rnum .ic{width:15px;height:15px}
.tl{display:flex;flex-direction:column}
.tl-row{display:flex;flex-wrap:wrap;align-items:baseline;gap:2px 10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.tl-row:last-child{border-bottom:none}
.tl-lbl{font-size:14px;font-weight:600;min-width:130px}
.tl-dt{font-size:13px;color:#334155}
.tl-meta{font-size:12px;color:#64748b;margin-left:auto}
.tl-total{margin-top:10px;padding-top:10px;border-top:2px solid #e2e8f0;font-size:14px;color:#0f172a}
.tl-total b{color:#2563eb}
.userbar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#172554;color:#c7d2fe;padding:8px 16px;font-size:12px}
.ubadge{color:#fff;font-weight:700;font-size:15px}
.logoutbtn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:#cbd5e1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.logoutbtn .ic{width:14px;height:14px}
.logoutbtn:hover{color:#fff}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;background:linear-gradient(135deg,#1e3a8a 0%,#4338ca 55%,#4f46e5 100%)}
.login-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 10px 30px rgba(15,23,42,.06);display:flex;flex-direction:column}
.login-card .wmark{margin-bottom:10px}
.login-title{font-size:18px;font-weight:700}
.login-sub{font-size:13px;color:#64748b;margin-bottom:14px}
.login-err{font-size:13px;color:#e11d48;margin-bottom:6px}
.login-btn{width:100%;margin-top:4px;padding:11px}
.head-actions{display:flex;gap:8px;flex:none}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.cal-navbtn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;color:#334155;cursor:pointer}
.cal-navbtn .ic{width:18px;height:18px}
.cal-navbtn:hover{background:#f8fafc}
.cal-title{font-size:16px;font-weight:700;min-width:140px;text-align:center}
.cal-todaybtn{display:block;margin:0 auto 16px;padding:6px 14px}
.cal-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 16px;margin-bottom:14px}
.cal-lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#475569;font-weight:600}
.cal-lg i{width:10px;height:10px;border-radius:3px;display:inline-block;flex:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;font-family:ui-monospace,monospace;padding:4px 0}
.cal-cell{min-height:66px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;padding:4px;overflow:hidden}
.cal-cell.empty{background:#f8fafc;border-color:#f1f5f9}
.cal-cell.today{border-color:#2563eb;box-shadow:0 0 0 1px #2563eb}
.cal-day{font-size:12px;font-weight:600;color:#334155;text-align:right;padding:0 2px}
.cal-cell.today .cal-day{color:#2563eb}
.cal-evs{display:flex;flex-direction:column;gap:3px;margin-top:3px}
.cal-ev{display:block;width:100%;text-align:center;font-size:10px;line-height:1.3;font-weight:600;padding:3px 4px;border-radius:6px;border:none;cursor:pointer;background:var(--soft);color:var(--softtext);word-break:break-word;font-family:inherit}
.cal-ev-lbl{display:block;font-weight:800;opacity:.65;font-size:9px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:1px}
.cal-ev-ic{width:10px;height:10px;vertical-align:-1px;margin-right:2px}
@media print{
  .report-actions,.top,.userbar,.cal-navbtn,.cal-todaybtn{display:none!important}
  html,body{background:#fff}
  .report{padding:0;max-width:none}
  .rsection{border-color:#cbd5e1}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>

function compressImage(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onerror=reject;
    reader.onload=function(e){
      var img=new Image();
      img.onerror=reject;
      img.onload=function(){
        var w=img.width,h=img.height,max=900;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function rowToOrder(r){ return {id:r.id,code:r.code,cliente:r.cliente,stageIndex:r.stage_index,data:r.data||{},createdAt:new Date(r.created_at).getTime(),updatedAt:r.updated_at||''}; }

var pendingOps=[];
function syncFail(){ if(!storageError){ storageError=true; render(); } }
function syncOk(){ if(storageError){ storageError=false; render(); } }
function runOp(fn){ fn().then(function(){ syncOk(); flushOps(); }).catch(function(){ pendingOps.push(fn); syncFail(); }); }
function flushOps(){ if(!pendingOps.length) return Promise.resolve(true); var fn=pendingOps.shift(); return fn().then(function(){ syncOk(); return flushOps(); }).catch(function(){ pendingOps.unshift(fn); syncFail(); return false; }); }
function queueSaveOrder(o){ var payload={cliente:o.cliente,stage_index:o.stageIndex,data:o.data||{}}; var id=o.id; runOp(function(){ return remoteUpdate(id,payload); }); }

function migrateLocal(){
  try{
    var raw=localStorage.getItem('seguimiento_pedidos_v1'); if(!raw) return Promise.resolve();
    var arr=JSON.parse(raw)||[]; var have={}; orders.forEach(function(o){have[o.id]=1;});
    var pend=arr.filter(function(o){return o&&o.id&&!have[o.id];});
    if(!pend.length){ localStorage.removeItem('seguimiento_pedidos_v1'); return Promise.resolve(); }
    return Promise.all(pend.map(function(o){ return remoteInsert(o).then(function(){return true;}).catch(function(){return false;}); }))
      .then(function(res){ var ok=res.every(function(x){return x;}); if(ok) localStorage.removeItem('seguimiento_pedidos_v1'); return fetchOrders(); })
      .then(function(list){ orders=list; lastFp=fingerprint(list); });
  }catch(e){ return Promise.resolve(); }
}

function viewCalendar(){

    {lbl:'Solicitud',dt:(o.data.solicitud||{}).fecha||dateOnly(o.createdAt)},
    {lbl:'Visita programada',dt:(o.data.programacion||{}).fecha_visita},

function render(){

function createOrder(container){
  if(!canReg('solicitud')) return;
  var data=collect(container,FORM.solicitud,'solicitud'); var cliente=(data.cliente||'').trim();
  if(!cliente){ var el=container.querySelector('[name="cliente"]'); if(el){ el.focus(); el.style.borderColor='#f43f5e'; } return; }
  delete data.cliente;
  var order={id:'p'+Date.now()+Math.random().toString(36).slice(2,6),code:nextCode(orders),createdAt:Date.now(),stageIndex:0,cliente:cliente,data:{solicitud:data}};
  orders.unshift(order);

  photoBuf={}; pdfBuf={}; selectedId=order.id; view='detail'; render();
}
function completeStage(container,stageKey){

}

function onClick(e){
  var el=e.target.closest?e.target.closest('[data-act]'):null; if(!el) return;
  var act=el.getAttribute('data-act');

  else if(act==='back'){ photoBuf={}; pdfBuf={}; view='list'; render(); }
  else if(act==='open'){ photoBuf={}; pdfBuf={}; selectedId=el.getAttribute('data-id'); view='detail'; render(); }
  else if(act==='export'){ exportCSV(); }
  else if(act==='filter'){ var k=el.getAttribute('data-key'); filter=(k==='all')?null:k; updateFilterUI(); }
  else if(act==='photo-pick'){ var f=document.querySelector('.photo-file[data-cid="'+el.getAttribute('data-cid')+'"]'); if(f) f.click(); }
  else if(act==='pdf-pick'){ var f=document.querySelector('.pdf-file[data-cid="'+el.getAttribute('data-cid')+'"]'); if(f) f.click(); }
  else if(act==='photo-remove'){ var pc=el.getAttribute('data-cid'); var pi=parseInt(el.getAttribute('data-idx'),10); if(!Array.isArray(photoBuf[pc])) photoBuf[pc]=[]; photoBuf[pc].splice(pi,1); refreshPhoto(pc); }
  else if(act==='pdf-remove'){ var pc=el.getAttribute('data-cid'); var pi=parseInt(el.getAttribute('data-idx'),10); if(!Array.isArray(pdfBuf[pc])) pdfBuf[pc]=[]; pdfBuf[pc].splice(pi,1); refreshPdf(pc); }
  else if(act==='open-link'){ var _lf=el.closest('.field'); var _li=_lf?_lf.querySelector('input'):null; var _lu=_li?asURL(_li.value):null; if(_lu) window.open(_lu,'_blank','noopener'); }
  else if(act==='photo-dl'){ var _th=el.closest('.thumb'); var _im=_th?_th.querySelector('img'):null; if(_im&&_im.getAttribute('src')){ downloadDataURL(_im.getAttribute('src'), el.getAttribute('data-name')); } }
  else if(act==='toggle'){ var st=el.getAttribute('data-stage'); expandedDone=(expandedDone===st)?null:st; render(); }
  else if(act==='complete'){ completeStage(el.closest('[data-form]'),el.getAttribute('data-stage')); }
  else if(act==='save'){ saveStage(el.closest('[data-form]'),el.getAttribute('data-stage')); }
  else if(act==='create'){ createOrder(el.closest('[data-form]')); }
  else if(act==='report'){ view='report'; render(); window.scrollTo(0,0); }
  else if(act==='calendar'){ view='calendar'; render(); window.scrollTo(0,0); }
  else if(act==='cal-prev'){ calM--; if(calM<0){calM=11;calY--;} render(); }
  else if(act==='cal-next'){ calM++; if(calM>11){calM=0;calY++;} render(); }
  else if(act==='cal-today'){ var _n=new Date(); calY=_n.getFullYear(); calM=_n.getMonth(); render(); }
  else if(act==='back-detail'){ view='detail'; render(); }
  else if(act==='print'){ window.print(); }
  else if(act==='del-open'){ if(!canDelete()) return; confirmingDelete=true; render(); }
  else if(act==='del-cancel'){ confirmingDelete=false; render(); }
  else if(act==='del-confirm'){ doDelete(); }
}
function onInput(e){ if(e.target.id==='search'){ search=e.target.value; rebuildList(); } }
function onKeydown(e){ if(e.key==='Enter'&&e.target&&e.target.getAttribute&&e.target.getAttribute('name')==='pass'){ e.preventDefault(); var c=e.target.closest('[data-form="login"]'); if(c) doLogin(c); } }
function onChange(e){
  var t=e.target;
  if(t.classList&&t.classList.contains('photo-file')){
    var files=t.files; if(!files||!files.length) return; var cid=t.getAttribute('data-cid');
    if(!Array.isArray(photoBuf[cid])) photoBuf[cid]=[];
    var list=Array.prototype.slice.call(files);
    Promise.all(list.map(function(f){return compressImage(f);})).then(function(b64s){ photoBuf[cid]=photoBuf[cid].concat(b64s); refreshPhoto(cid); }).catch(function(){});
    t.value='';
  }
  if(t.classList&&t.classList.contains('pdf-file')){
    var files=t.files; if(!files||!files.length) return; var cid=t.getAttribute('data-cid');
    if(!Array.isArray(pdfBuf[cid])) pdfBuf[cid]=[];
    var list=Array.prototype.slice.call(files);
    Promise.all(list.map(function(f){return readPdf(f);})).then(function(items){ pdfBuf[cid]=pdfBuf[cid].concat(items); refreshPdf(cid); }).catch(function(){});
    t.value='';
  }
}

(function init(){
  session=loadSession();
  var app=document.getElementById('app');
  app.addEventListener('click',onClick);
  app.addEventListener('input',onInput);
  app.addEventListener('change',onChange);
  app.addEventListener('keydown',onKeydown);
  render();
  fetchOrders().then(function(list){ orders=list; lastFp=fingerprint(list); loadingData=false; return migrateLocal(); })
    .then(function(){ render(); })
    .catch(function(){ loadingData=false; storageError=true; render(); });
  setInterval(function(){
    if(pendingOps.length){ flushOps(); return; }
    if(!session) return;
    if(view!=='list'&&view!=='calendar') return;
    if(confirmingDelete) return;
    fetchOrders().then(function(list){ var fp=fingerprint(list); if(fp!==lastFp){ lastFp=fp; orders=list; render(); } }).catch(function(){});
  },20000);
})();
</script>
</body>
</html>
